name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install macOS dependencies (libomp for LightGBM)
      if: runner.os == 'macOS'
      run: |
        chmod +x .github/scripts/install_osx_dependencies.sh
        ./.github/scripts/install_osx_dependencies.sh

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[test]"
        python -m pip install --force-reinstall --no-deps torch --extra-index-url https://download.pytorch.org/whl/cpu

    - name: Run tests
      run: |
        pytest tests/ -vv --tb=long

    - name: Generate coverage for Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      continue-on-error: true
      run: |
        pytest tests/ --cov --cov-report=xml

    - name: Upload coverage reports to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v5
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
