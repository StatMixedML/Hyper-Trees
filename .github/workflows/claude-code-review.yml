name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Focus on substantive issues:
            - Bugs, logic errors, or incorrect behavior
            - Security vulnerabilities (injection, auth flaws, secrets exposure)
            - Performance problems (unnecessary allocations, N+1 queries, missing indices)
            - Breaking changes or API contract violations
            - Misleading or ambiguous names that could cause misuse by other developers
            - Public functions, classes, and modules missing docstrings
            - New or changed logic that lacks corresponding test coverage

            Do NOT flag minor style or formatting issues that a linter or formatter would catch.
            If no substantive issues are found, post a short approval comment.

            The PR branch is already checked out.
            Use `gh pr comment` for a top-level summary.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for specific code issues.
            Only post GitHub comments, do not submit review text as messages.

          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 10
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"