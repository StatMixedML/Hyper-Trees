name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: only run when certain files change
    # paths:
    #   - "hypertrees/**/*.py"
    #   - "experiments/**/*.py"

jobs:
  claude-review:
    # Optional: only review PRs from specific authors
    # if: github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # In v1, `prompt` replaces the built-in review context, so the PR
          # identifiers must be passed explicitly or Claude can lose track of
          # which PR it is reviewing.
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Be constructive and helpful, and leave inline comments on the
            relevant lines of the diff where appropriate.

          # Optional: pin a model or pass other Claude Code CLI flags.
          # claude_args: |
          #   --model claude-sonnet-4-6
          #   --max-turns 10